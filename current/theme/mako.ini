# Amekoji (dark) - Generated by FormalConf
# Mako notification daemon theme

font=JetBrains Mono 11
background-color=#232829
text-color=#DCD6D6
border-color=#788587
border-size=2
border-radius=8
padding=12
margin=12
default-timeout=5000
icons=1
icon-path=/usr/share/icons/Papirus-Dark
max-icon-size=48
markup=1
actions=1
format=<b>%s</b>\n%b
anchor=top-right
width=350
height=150

[urgency=low]
background-color=#232829
border-color=#788587

[urgency=normal]
background-color=#232829
border-color=#85ABBC

[urgency=critical]
background-color=#B39A98
text-color=#232829
border-color=#B39A98
default-timeout=0
