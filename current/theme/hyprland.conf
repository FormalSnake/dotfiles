# everforest (dark) - Generated by FormalConf
# Hyprland color configuration
# Source this file from your main hyprland.conf

# GTK/GNOME theme (Linux)
env = GTK_THEME,formalconf-everforest-Dark
exec = gsettings set org.gnome.desktop.interface gtk-theme "formalconf-everforest-Dark"
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface icon-theme "Adwaita"
exec = gsettings set org.gnome.desktop.interface cursor-theme "Adwaita"
exec = gsettings set org.gnome.desktop.interface cursor-size 24
exec = gsettings set org.gnome.desktop.interface font-name "BlexMono Nerd Font 11"

# General colors
general {
    col.active_border = rgba(127,187,179,1) rgba(127,187,179,1) 45deg
    col.inactive_border = rgb(71,82,88)
}

# Group colors
group {
    col.border_active = rgba(127,187,179,1)
    col.border_inactive = rgba(71,82,88,1)
    col.border_locked_active = rgba(219,188,127,1)
    col.border_locked_inactive = rgba(71,82,88,1)

    groupbar {
        col.active = rgba(127,187,179,1)
        col.inactive = rgba(71,82,88,1)
        col.locked_active = rgba(219,188,127,1)
        col.locked_inactive = rgba(71,82,88,1)
    }
}

# Decoration
decoration {
    shadow {
        color = rgba(45,53,59,1)
        color_inactive = rgba(71,82,88,1)
    }
}

# Misc
misc {
    background_color = rgba(45,53,59,1)
}
