# ── Hotkeys (Super = Ctrl+Opt+Cmd) ───────────────────────────────────────────
# Focus (niri Super+hjkl)
[[hotkeys]]
id = "focus.left"
binding = "Control+Option+Command+H"
[[hotkeys]]
id = "focus.down"
binding = "Control+Option+Command+J"
[[hotkeys]]
id = "focus.up"
binding = "Control+Option+Command+K"
[[hotkeys]]
id = "focus.right"
binding = "Control+Option+Command+L"

# Move (niri Super+Shift+hjkl)
[[hotkeys]]
id = "move.left"
binding = "Control+Option+Command+Shift+H"
[[hotkeys]]
id = "move.down"
binding = "Control+Option+Command+Shift+J"
[[hotkeys]]
id = "move.up"
binding = "Control+Option+Command+Shift+K"
[[hotkeys]]
id = "move.right"
binding = "Control+Option+Command+Shift+L"

# Switch workspace (niri Super+1..9). OmniWM's switchWorkspace.<n> hotkey id is a
# 0-BASED workspaceIndex (verified: .1 lands on the 2nd workspace), NOT the 1-based
# `switch-workspace <n>` CLI number. So key "1" → index 0 (web), key "9" → index 8.
[[hotkeys]]
id = "switchWorkspace.0"
binding = "Control+Option+Command+1"
[[hotkeys]]
id = "switchWorkspace.1"
binding = "Control+Option+Command+2"
[[hotkeys]]
id = "switchWorkspace.2"
binding = "Control+Option+Command+3"
[[hotkeys]]
id = "switchWorkspace.3"
binding = "Control+Option+Command+4"
[[hotkeys]]
id = "switchWorkspace.4"
binding = "Control+Option+Command+5"
[[hotkeys]]
id = "switchWorkspace.5"
binding = "Control+Option+Command+6"
[[hotkeys]]
id = "switchWorkspace.6"
binding = "Control+Option+Command+7"
[[hotkeys]]
id = "switchWorkspace.7"
binding = "Control+Option+Command+8"
[[hotkeys]]
id = "switchWorkspace.8"
binding = "Control+Option+Command+9"

# Send window to workspace (niri Super+Shift+1..9). Same 0-based index as above.
[[hotkeys]]
id = "moveToWorkspace.0"
binding = "Control+Option+Command+Shift+1"
[[hotkeys]]
id = "moveToWorkspace.1"
binding = "Control+Option+Command+Shift+2"
[[hotkeys]]
id = "moveToWorkspace.2"
binding = "Control+Option+Command+Shift+3"
[[hotkeys]]
id = "moveToWorkspace.3"
binding = "Control+Option+Command+Shift+4"
[[hotkeys]]
id = "moveToWorkspace.4"
binding = "Control+Option+Command+Shift+5"
[[hotkeys]]
id = "moveToWorkspace.5"
binding = "Control+Option+Command+Shift+6"
[[hotkeys]]
id = "moveToWorkspace.6"
binding = "Control+Option+Command+Shift+7"
[[hotkeys]]
id = "moveToWorkspace.7"
binding = "Control+Option+Command+Shift+8"
[[hotkeys]]
id = "moveToWorkspace.8"
binding = "Control+Option+Command+Shift+9"

# Workspace back-and-forth (niri Super+Tab)
[[hotkeys]]
id = "workspaceBackAndForth"
binding = "Control+Option+Command+Tab"

# Column width / fullscreen / overview / float
[[hotkeys]]
id = "toggleColumnFullWidth"          # niri Super+F (maximize column)
binding = "Control+Option+Command+F"
[[hotkeys]]
id = "toggleFullscreen"               # niri Super+Shift+F
binding = "Control+Option+Command+Shift+F"
[[hotkeys]]
id = "toggleOverview"                 # niri Super+O
binding = "Control+Option+Command+O"
[[hotkeys]]
id = "toggleFocusedWindowFloating"    # niri Super+V
binding = "Control+Option+Command+V"
[[hotkeys]]
id = "cycleColumnWidthForward"        # niri Super+R (cycle preset widths)
binding = "Control+Option+Command+R"
[[hotkeys]]
id = "cycleColumnWidthBackward"
binding = "Control+Option+Command+Shift+R"
[[hotkeys]]
id = "setColumnWidth.decrease10Percent"   # niri Super+Minus
binding = "Control+Option+Command+Minus"
[[hotkeys]]
id = "setColumnWidth.increase10Percent"   # niri Super+Plus
binding = "Control+Option+Command+Equal"

# Command palette (niri Super+Space launcher) + quake terminal (niri Super+Return)
[[hotkeys]]
id = "openCommandPalette"
binding = "Control+Option+Command+Space"
[[hotkeys]]
id = "toggleQuakeTerminal"
binding = "Control+Option+Command+Return"

# Drop the stock bare-Option binds that would fire while typing Option-glyphs.
[[hotkeys]]
id = "focusPrevious"
binding = "Unassigned"
[[hotkeys]]
id = "toggleColumnTabbed"
binding = "Unassigned"
[[hotkeys]]
id = "toggleWorkspaceLayout"
binding = "Unassigned"
[[hotkeys]]
id = "balanceSizes"
binding = "Unassigned"
[[hotkeys]]
id = "raiseAllFloatingWindows"
binding = "Unassigned"
[[hotkeys]]
id = "setWindowHeight.decrease10Percent"
binding = "Unassigned"
[[hotkeys]]
id = "setWindowHeight.increase10Percent"
binding = "Unassigned"

