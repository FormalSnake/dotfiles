# OmniWM — mirrors the g815 niri setup.
#
# "Super" here is Right Command, which Karabiner remaps to Ctrl+Opt+Cmd (see
# karabiner.json). Shift is deliberately left OUT of that chord so it can still
# discriminate the niri move-bindings (Super+Shift+hjkl). OmniWM's own native
# Hyper trigger is NOT used — it always injects Shift, which would collapse
# focus and move onto the same chord.
#
# Only the tables/keys that differ from OmniWM's defaults are written; the
# loader fills everything else in (SettingsTOMLCodec recovers missing keys).
# Hotkeys are overrides merged onto the defaults by id, so unlisted actions
# keep their stock bindings.

[general]
defaultLayoutType = "niri"
# Turn on the omniwmctl IPC socket (~/Library/Caches/com.barut.OmniWM/ipc.sock).
# Off by default; sketchybar drives its workspace pills off `omniwmctl query
# workspaces` / `omniwmctl watch active-workspace`, so this is load-bearing for
# the bar (users/kyandesutter/mixins/sketchybar.nix).
ipcEnabled = true

[focus]
# niri keeps keyboard focus on click only.
followsMouse = false

# OmniWM's own workspace bar is disabled — sketchybar replaces it (mounted on the
# top edge, notch-aware, mirroring the g815 DMS bar). See mixins/sketchybar.nix.
[workspaceBar]
enabled = false

[gaps]
# Gaps are off unless explicitly enabled (like [borders]); size alone does nothing.
enabled = true
size = 8.0

[gaps.outer]
left = 8.0
right = 8.0
top = 8.0
bottom = 8.0

[niri]
# Half-width columns, matching niri's default-column-width proportion 0.5.
defaultColumnWidth = 0.5

[borders]
enabled = true
width = 2.0

[borders.color]
# Flexoki blue (#4385be) — the same static border accent the g815 niri config
# falls back to before Noctalia themes it.
red = 0.263
green = 0.522
blue = 0.745
alpha = 1.0

[quakeTerminal]
# Ghostty drop-down on Super+Return (niri binds Super+Return to a terminal).
enabled = true

# ── Workspaces ───────────────────────────────────────────────────────────────
# Numeric names drive the Super+N binds; displayName is the role label shown in
# the bar. Roles match the g815 niri / aerospace workspace layout.

[[workspaces]]
id = "33f7ff54-2da6-43f2-9dd5-a5033a494bf2"
name = "1"
displayName = "web"
layoutType = "niri"
monitorAssignment = { type = "main" }

