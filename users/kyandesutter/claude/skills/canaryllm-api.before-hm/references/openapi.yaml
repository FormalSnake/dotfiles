                  type: string
                  maxLength: 2000
                type:
                  type: string
                  enum: [interview, conversation]
                systemPrompt:
                  type: string
                  minLength: 1
                  maxLength: 10000
                firstMessage:
                  type: string
                  maxLength: 1000
                voiceId:
                  type: string
                  maxLength: 100
                voiceModel:
                  type: string
                  maxLength: 100
                voiceSettings:
                  type: object
                  nullable: true
                  description: ElevenLabs agent TTS voice settings. Lower stability renders audio tags (e.g. [laughs]) more expressively.
                  properties:
                    stability:
                      type: number
                      minimum: 0
                      maximum: 1
                    speed:
                      type: number
                      minimum: 0.7
                      maximum: 1.2
                    similarityBoost:
                      type: number
                      minimum: 0
                      maximum: 1
                language:
                  type: string
                  maxLength: 100
                languagePresets:
                  oneOf:
                    - type: object
                      additionalProperties:
                        type: object
                        properties:
                          firstMessage:
                            type: string
                            maxLength: 1000
                    - type: "null"
                llmProvider:
                  oneOf:
                    - type: string
                      enum: [gemini, vertex, openai, anthropic, xai, perplexity, lmstudio]
                    - type: "null"
                llmModel:
                  oneOf:
                    - type: string
                      maxLength: 100
                    - type: "null"
