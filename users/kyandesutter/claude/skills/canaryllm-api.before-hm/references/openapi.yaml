                  type: string
                  maxLength: 255
                maxDurationSeconds:
                  type: integer
                  minimum: 30
                  maximum: 3600
                tag:
                  oneOf:
                    - type: string
                      maxLength: 100
                    - type: "null"
                questions:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [question]
                    properties:
                      question:
                        type: string
                        minLength: 1
                        maxLength: 2000
                      context:
                        type: string
                        maxLength: 2000
                      isRequired:
                        type: boolean
