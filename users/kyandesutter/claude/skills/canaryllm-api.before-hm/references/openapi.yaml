  #  Conversational AI
  # ──────────────────────────────────────────────
  /api/convagents/templates:
    post:
      operationId: createTemplate
      summary: Create a conversation template
      tags: [Conversational AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, systemPrompt]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                  maxLength: 2000
                type:
                  type: string
                  enum: [interview, conversation]
                systemPrompt:
                  type: string
                  minLength: 1
                  maxLength: 10000
                firstMessage:
                  type: string
                  maxLength: 1000
                voiceId:
                  type: string
                  maxLength: 100
                voiceModel:
                  type: string
                  maxLength: 100
                voiceSettings:
                  type: object
                  description: ElevenLabs agent TTS voice settings. Lower stability renders audio tags (e.g. [laughs]) more expressively.
                  properties:
                    stability:
                      type: number
                      minimum: 0
                      maximum: 1
                    speed:
                      type: number
                      minimum: 0.7
                      maximum: 1.2
                    similarityBoost:
                      type: number
                      minimum: 0
                      maximum: 1
                language:
                  type: string
                  maxLength: 100
                languagePresets:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      firstMessage:
                        type: string
                        maxLength: 1000
                llmProvider:
                  type: string
                  enum: [gemini, vertex, openai, anthropic, xai, perplexity, lmstudio]
                llmModel:
                  type: string
                  maxLength: 100
                clientWebhookUrl:
                  type: string
                  format: uri
                webhookSecret:
                  type: string
                  maxLength: 255
                maxDurationSeconds:
                  type: integer
                  minimum: 30
                  maximum: 3600
                tag:
                  type: string
                  maxLength: 100
                questions:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [question]
                    properties:
                      question:
                        type: string
                        minLength: 1
                        maxLength: 2000
                      context:
                        type: string
                        maxLength: 2000
                      isRequired:
                        type: boolean
                tools:
                  type: array
                  maxItems: 7
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                        enum:
                          - end_call
                          - language_detection
                          - transfer_to_agent
                          - transfer_to_number
                          - skip_turn
                          - play_keypad_touch_tone
                          - voicemail_detection
                      description:
                        type: string
                        maxLength: 500
      responses:
        "201":
          description: Template created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: listTemplates
      summary: List conversation templates
      tags: [Conversational AI]
      responses:
        "200":
          description: Template list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

