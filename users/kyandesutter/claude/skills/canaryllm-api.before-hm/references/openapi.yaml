openapi: 3.1.0
info:
  title: CanaryLLM API
  version: 1.0.0
  description: >
    Multi-provider LLM gateway with queue system, supporting chat completions,
    image/video/audio generation, vision, and conversational AI.

servers:
  - url: http://localhost:3000
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Chat Completions
    description: Submit chat completion requests to any supported LLM provider.
  - name: Queue Management
    description: Check status, retrieve results, stream, or cancel queued tasks.
  - name: Image Generation
    description: Generate images via OpenAI, Gemini, Vertex, xAI, or Ollama.
  - name: Video Generation
    description: Generate videos via Gemini, Vertex, or xAI.
  - name: Audio (TTS/STT)
    description: Text-to-speech and speech-to-text via ElevenLabs or MLX Audio.
  - name: Sound & Music
    description: Sound effect and music generation via ElevenLabs.
  - name: Vision
    description: Object detection, face detection, auto-labeling, and custom model training.
  - name: Conversational AI
    description: ElevenLabs Conversational AI template and session management.
  - name: Public
    description: Unauthenticated endpoints for model/voice discovery.
  - name: OpenAI Compatible
    description: Drop-in OpenAI-compatible chat completions endpoint.
  - name: Anthropic Compatible
    description: Anthropic Messages API-compatible endpoint for Claude Code integration.

paths:
  # ──────────────────────────────────────────────
  #  Chat Completions
  # ──────────────────────────────────────────────
  /api/llm/complete:
    post:
      operationId: createCompletion
      summary: Submit a chat completion request
      tags: [Chat Completions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, messages]
              properties:
                provider:
                  type: string
                  enum: [openai, gemini, vertex, anthropic, xai, lmstudio, perplexity]
                messages:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: "#/components/schemas/Message"
                model:
                  type: string
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                maxTokens:
                  type: integer
                  minimum: 1
                topP:
                  type: number
                  minimum: 0
                  maximum: 1
                frequencyPenalty:
                  type: number
                  minimum: -2
                  maximum: 2
                presencePenalty:
                  type: number
                  minimum: -2
                  maximum: 2
                stop:
                  type: array
                  items:
                    type: string
                stream:
                  type: boolean
                responseFormat:
                  type: string
                  enum: [text, json, json_schema]
                jsonSchema:
                  type: object
                tools:
                  type: array
                  items:
                    $ref: "#/components/schemas/ToolDefinition"
                toolChoice:
                  oneOf:
                    - type: string
                      enum: [auto, none, required]
                    - type: object
                      required: [type, function]
                      properties:
                        type:
                          type: string
                          enum: [function]
                        function:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                thinkingMode:
                  type: object
                  required: [enabled]
                  properties:
                    enabled:
                      type: boolean
                    budget:
                      type: number
                      minimum: -1
                webSearch:
                  type: object
                  required: [enabled]
                  properties:
                    enabled:
                      type: boolean
                    maxUses:
                      type: integer
                      minimum: 1
                    allowedDomains:
                      type: array
                      items:
                        type: string
                    blockedDomains:
                      type: array
                      items:
                        type: string
                    recencyFilter:
                      type: string
                      enum: [month, week, day, hour]
                    userLocation:
                      type: object
                      properties:
                        country:
                          type: string
                        city:
                          type: string
                        region:
                          type: string
                        timezone:
                          type: string
                    xSearch:
                      type: object
                      properties:
                        allowedHandles:
                          type: array
                          maxItems: 10
                          items:
                            type: string
                        excludedHandles:
                          type: array
                          maxItems: 10
                          items:
                            type: string
                        fromDate:
                          type: string
                        toDate:
                          type: string
                        enableImageUnderstanding:
                          type: boolean
                        enableVideoUnderstanding:
                          type: boolean
                cache:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    ttl:
                      type: number
                      minimum: 1
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
                timeout:
                  type: integer
                  minimum: 1000
                  maximum: 300000
      responses:
        "200":
          description: Task queued successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ──────────────────────────────────────────────
  #  Queue Management
  # ──────────────────────────────────────────────
  /api/llm/queue/status:
    post:
      operationId: getQueueStatus
      summary: Get task queue status
      tags: [Queue Management]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queueId]
              properties:
                queueId:
                  type: string
      responses:
        "200":
          description: Queue status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      queueId:
                        type: string
                      status:
                        type: string
                        enum: [queued, processing, completed, error, cancelled, not_found]
                      position:
                        type: integer
                      createdAt:
                        type: string
                        format: date-time
                      startedAt:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/llm/queue/result:
    post:
      operationId: getQueueResult
      summary: Retrieve the result of a completed task
      tags: [Queue Management]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queueId]
              properties:
                queueId:
                  type: string
      responses:
        "200":
          description: Task completed. Result included.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      queueId:
                        type: string
                      status:
                        type: string
                      completedAt:
                        type: string
                        format: date-time
                      result:
                        type: object
                        description: Provider-specific result payload.
        "202":
          description: Task still processing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: false
                  error:
                    type: string
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [queued, processing]
                      position:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/llm/queue/stream:
    post:
      operationId: streamQueueResult
      summary: Stream results via SSE
      description: >
        Returns a Server-Sent Events stream. Events: `start`, `chunk`, `done`, `error`.
      tags: [Queue Management]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queueId]
              properties:
                queueId:
                  type: string
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/llm/queue/cancel:
    post:
      operationId: cancelQueueTask
      summary: Cancel a queued task
      tags: [Queue Management]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queueId]
              properties:
                queueId:
                  type: string
      responses:
        "200":
          description: Task cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      queueId:
                        type: string
                      status:
                        type: string
                        const: cancelled
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Image Generation
  # ──────────────────────────────────────────────
  /api/llm/generate-image:
    post:
      operationId: generateImage
      summary: Generate images from a text prompt
      tags: [Image Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, prompt]
              properties:
                provider:
                  type: string
                  enum: [openai, gemini, vertex, xai, ollama]
                prompt:
                  type: string
                  minLength: 1
                  maxLength: 10000
                model:
                  type: string
                n:
                  type: integer
                  minimum: 1
                  maximum: 10
                size:
                  type: string
                aspectRatio:
                  type: string
                quality:
                  type: string
                  enum: [standard, hd, ultra]
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: Image generation task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Video Generation
  # ──────────────────────────────────────────────
  /api/llm/generate-video:
    post:
      operationId: generateVideo
      summary: Generate videos from a text prompt
      tags: [Video Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, prompt]
              properties:
                provider:
                  type: string
                  enum: [gemini, vertex, xai]
                prompt:
                  type: string
                  minLength: 1
                  maxLength: 10000
                model:
                  type: string
                aspectRatio:
                  type: string
                resolution:
                  type: string
                durationSeconds:
                  type: integer
                  minimum: 1
                  maximum: 60
                numberOfVideos:
                  type: integer
                  minimum: 1
                  maximum: 4
                imageUrl:
                  type: string
                  format: uri
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: Video generation task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/upload-video:
    post:
      operationId: uploadVideo
      summary: Upload a video file for use in chat completions
      tags: [Video Generation]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video]
              properties:
                video:
                  type: string
                  format: binary
      responses:
        "200":
          description: Video uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      fileId:
                        type: string
                        format: uuid
                      mimeType:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Audio (TTS / STT)
  # ──────────────────────────────────────────────
  /api/llm/generate-audio:
    post:
      operationId: generateAudio
      summary: Generate speech from text (TTS)
      tags: [Audio (TTS/STT)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, text]
              properties:
                provider:
                  type: string
                  enum: [elevenlabs, mlxaudio]
                text:
                  type: string
                  minLength: 1
                  maxLength: 100000
                model:
                  type: string
                voiceId:
                  type: string
                outputFormat:
                  type: string
                  enum:
                    - mp3_44100_128
                    - mp3_44100_192
                    - pcm_16000
                    - pcm_22050
                    - pcm_24000
                    - pcm_44100
                voiceSettings:
                  type: object
                  properties:
                    stability:
                      type: number
                      minimum: 0
                      maximum: 1
                    similarityBoost:
                      type: number
                      minimum: 0
                      maximum: 1
                    style:
                      type: number
                      minimum: 0
                      maximum: 1
                    useSpeakerBoost:
                      type: boolean
                languageCode:
                  type: string
                  maxLength: 10
                previousText:
                  type: string
                  maxLength: 5000
                nextText:
                  type: string
                  maxLength: 5000
                applyTextNormalization:
                  type: string
                  enum: [auto, on, off]
                previousRequestIds:
                  type: array
                  items:
                    type: string
                  maxItems: 3
                  description: ElevenLabs request IDs from previous TTS calls for prosody continuity
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: TTS task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/transcribe:
    post:
      operationId: transcribeAudio
      summary: Transcribe audio to text (STT)
      tags: [Audio (TTS/STT)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, audio, mimeType]
              properties:
                provider:
                  type: string
                  enum: [elevenlabs, mlxaudio]
                audio:
                  type: string
                  description: Base64-encoded audio data.
                  minLength: 1
                mimeType:
                  type: string
                  description: MIME type of the audio (e.g. audio/mp3, audio/wav).
                model:
                  type: string
                language:
                  type: string
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: STT task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Sound & Music
  # ──────────────────────────────────────────────
  /api/llm/generate-sound-effect:
    post:
      operationId: generateSoundEffect
      summary: Generate a sound effect from a text description
      tags: [Sound & Music]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 10000
                model:
                  type: string
                durationSeconds:
                  type: number
                  minimum: 0.5
                  maximum: 30
                promptInfluence:
                  type: number
                  minimum: 0
                  maximum: 1
                loop:
                  type: boolean
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: Sound effect task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/generate-music:
    post:
      operationId: generateMusic
      summary: Generate music from a text prompt
      tags: [Sound & Music]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  minLength: 1
                  maxLength: 10000
                model:
                  type: string
                durationMs:
                  type: integer
                  minimum: 3000
                  maximum: 600000
                forceInstrumental:
                  type: boolean
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: Music generation task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/generate-dialogue:
    post:
      operationId: generateDialogue
      summary: Generate multi-speaker dialogue audio
      description: >
        Generates audio from a multi-speaker dialogue. Each input turn has its own voice_id.
        Only the eleven_v3 model is supported. Maximum 10 unique voice IDs per request.
      tags: [Sound & Music]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputs]
              properties:
                inputs:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    required: [text, voiceId]
                    properties:
                      text:
                        type: string
                        minLength: 1
                        maxLength: 50000
                      voiceId:
                        type: string
                        minLength: 1
                model:
                  type: string
                  description: Only "eleven_v3" is supported.
                outputFormat:
                  type: string
                  enum: [mp3_44100_128, mp3_44100_192, pcm_16000, pcm_22050, pcm_24000, pcm_44100]
                languageCode:
                  type: string
                  maxLength: 10
                voiceSettings:
                  type: object
                  properties:
                    stability:
                      type: number
                      minimum: 0
                      maximum: 1
                    similarityBoost:
                      type: number
                      minimum: 0
                      maximum: 1
                    style:
                      type: number
                      minimum: 0
                      maximum: 1
                    useSpeakerBoost:
                      type: boolean
                seed:
                  type: integer
                  minimum: 0
                  maximum: 4294967295
                applyTextNormalization:
                  type: string
                  enum: [auto, "on", "off"]
                tag:
                  type: string
                  maxLength: 100
                service:
                  type: string
      responses:
        "200":
          description: Dialogue generation task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Provider Info
  # ──────────────────────────────────────────────
  /api/llm/providers:
    get:
      operationId: listProviders
      summary: List available providers
      tags: [Chat Completions]
      responses:
        "200":
          description: Provider list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      providers:
                        type: array
                        items:
                          type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/models:
    get:
      operationId: listModels
      summary: List models for a provider
      tags: [Chat Completions]
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                      models:
                        type: array
                        items:
                          $ref: "#/components/schemas/ModelInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/voices:
    get:
      operationId: listVoices
      summary: List voices for a provider
      tags: [Audio (TTS/STT)]
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Voice list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                      voices:
                        type: array
                        items:
                          $ref: "#/components/schemas/VoiceInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/capabilities:
    get:
      operationId: getCapabilities
      summary: Get capability matrix for all providers
      tags: [Chat Completions]
      responses:
        "200":
          description: Capabilities per provider.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        imageGeneration:
                          type: boolean
                        videoGeneration:
                          type: boolean
                        textToSpeech:
                          type: boolean
                        speechToText:
                          type: boolean
                        imageRecognition:
                          type: boolean
                        faceDetection:
                          type: boolean
                        soundEffects:
                          type: boolean
                        musicGeneration:
                          type: boolean
                        models:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              name:
                                type: string
                              capabilities:
                                type: array
                                items:
                                  type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/concurrency:
    get:
      operationId: getConcurrency
      summary: Get concurrency status for all providers
      tags: [Queue Management]
      responses:
        "200":
          description: Concurrency status map.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        active:
                          type: integer
                        queued:
                          type: integer
                        limit:
                          type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/concurrency/{provider}:
    get:
      operationId: getProviderConcurrency
      summary: Get concurrency status for a specific provider
      tags: [Queue Management]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider concurrency status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                      active:
                        type: integer
                      queued:
                        type: integer
                      limit:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/usage:
    get:
      operationId: getUsage
      summary: Get current month usage stats
      tags: [Queue Management]
      responses:
        "200":
          description: Usage statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/usage/monthly:
    get:
      operationId: getMonthlyUsage
      summary: Get monthly usage breakdown
      tags: [Queue Management]
      responses:
        "200":
          description: Monthly usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/usage/daily:
    get:
      operationId: getDailyUsage
      summary: Get daily usage breakdown
      tags: [Queue Management]
      responses:
        "200":
          description: Daily usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/llm/health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [Queue Management]
      security: []
      responses:
        "200":
          description: Service healthy.
