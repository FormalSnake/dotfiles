  # ──────────────────────────────────────────────
  #  OpenAI Compatible
  # ──────────────────────────────────────────────
  /v1/chat/completions:
    post:
      operationId: openaiChatCompletions
      summary: OpenAI-compatible chat completions
      description: >
        Drop-in replacement for the OpenAI chat completions API.
        Model format: `provider/model` (e.g. `anthropic/claude-sonnet-4-5`).
        Supports streaming via SSE.
        Compatible with pi.dev via a custom provider in `~/.pi/agent/models.json`.
      tags: [OpenAI Compatible]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                  description: 'Format: provider/model (e.g. "anthropic/claude-sonnet-4-5").'
                messages:
                  type: array
                  minItems: 1
                  maxItems: 5000
                  items:
                    type: object
                    required: [role]
                    properties:
                      role:
                        type: string
                        enum: [system, developer, user, assistant, tool]
                      content:
                        oneOf:
                          - type: string
                          - type: "null"
                          - type: array
                            items:
                              oneOf:
                                - type: object
                                  required: [type, text]
                                  properties:
                                    type:
                                      type: string
                                      const: text
                                    text:
                                      type: string
                                - type: object
                                  required: [type, image_url]
                                  properties:
                                    type:
                                      type: string
                                      const: image_url
                                    image_url:
                                      type: object
                                      required: [url]
                                      properties:
                                        url:
                                          type: string
                                        detail:
                                          type: string
                      name:
                        type: string
                      tool_calls:
                        type: array
                        items:
                          type: object
                          required: [id, type, function]
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                              const: function
                            function:
                              type: object
                              required: [name, arguments]
                              properties:
                                name:
                                  type: string
                                arguments:
                                  type: string
                      tool_call_id:
                        type: string
                stream:
                  type: boolean
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                max_tokens:
                  type: integer
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                frequency_penalty:
                  type: number
                  minimum: -2
                  maximum: 2
                presence_penalty:
                  type: number
                  minimum: -2
                  maximum: 2
                stop:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                tools:
                  type: array
                  items:
                    $ref: "#/components/schemas/ToolDefinition"
                tool_choice: {}
                response_format:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [text, json_object]
                reasoning_effort:
                  type: string
                  enum: [minimal, low, medium, high, xhigh]
                  description: >
                    Extended-thinking effort level (de-facto OpenAI o-series convention,
                    also used by pi.dev). Maps to a token budget for Gemini/Anthropic
                    extended thinking, or passes through as `reasoning_effort` to OpenAI
                    o-series + xAI grok-reasoning models. `xhigh` is clamped to `high`
                    for providers that don't support it natively.
      responses:
        "200":
          description: Chat completion response (non-streaming) or SSE stream.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    const: chat.completion
                  created:
                    type: integer
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        message:
                          type: object
                          properties:
                            role:
                              type: string
                              const: assistant
                            content:
                              type: string
                            reasoning_content:
                              type: string
                              description: >
                                Extended-thinking content (Gemini thinking, Anthropic
                                extended thinking, xAI grok reasoning). Omitted for
                                providers that hide reasoning content (e.g. OpenAI o-series).
                            tool_calls:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    const: function
                                  function:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                      arguments:
                                        type: string
                        finish_reason:
                          type: string
                          enum: [stop, length, content_filter, tool_calls]
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
            text/event-stream:
              schema:
                type: string
                description: "SSE stream of chat.completion.chunk objects, terminated by data: [DONE]."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Anthropic Compatible
  # ──────────────────────────────────────────────
  /v1/messages:
    post:
      operationId: anthropicMessages
      summary: Anthropic Messages API-compatible endpoint
      description: >
        Drop-in replacement for the Anthropic Messages API.
        Model format: `provider/model` (e.g. `anthropic/claude-sonnet-4-5`).
        Compatible with Claude Code via ANTHROPIC_BASE_URL.
        Supports streaming via named SSE events and non-streaming JSON responses.
      tags: [Anthropic Compatible]
      parameters:
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
          description: Accepted but not enforced. Example "2023-06-01".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages, max_tokens]
              properties:
                model:
                  type: string
                  description: 'Format: provider/model (e.g. "anthropic/claude-sonnet-4-5").'
                messages:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              oneOf:
                                - type: object
                                  required: [type, text]
                                  properties:
                                    type:
                                      type: string
                                      const: text
                                    text:
                                      type: string
                                - type: object
                                  required: [type, source]
                                  properties:
                                    type:
                                      type: string
                                      const: image
                                    source:
                                      type: object
                                      required: [type, media_type, data]
                                      properties:
                                        type:
                                          type: string
                                          const: base64
                                        media_type:
                                          type: string
                                        data:
                                          type: string
                                - type: object
                                  required: [type, id, name, input]
                                  properties:
                                    type:
                                      type: string
                                      const: tool_use
                                    id:
                                      type: string
                                    name:
                                      type: string
                                    input:
                                      type: object
                                - type: object
                                  required: [type, tool_use_id]
                                  properties:
                                    type:
                                      type: string
                                      const: tool_result
                                    tool_use_id:
                                      type: string
                                    content:
                                      oneOf:
                                        - type: string
                                        - type: array
                                          items:
                                            type: object
                                            properties:
                                              type:
                                                type: string
                                                const: text
                                              text:
                                                type: string
                                    is_error:
                                      type: boolean
                max_tokens:
                  type: integer
                  minimum: 1
                system:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                        required: [type, text]
                        properties:
                          type:
                            type: string
                            const: text
                          text:
                            type: string
                stream:
                  type: boolean
                temperature:
                  type: number
                  minimum: 0
                  maximum: 1
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                top_k:
                  type: integer
                stop_sequences:
                  type: array
                  items:
                    type: string
                tools:
                  type: array
                  items:
                    type: object
                    required: [name, input_schema]
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      input_schema:
                        type: object
                tool_choice:
                  oneOf:
                    - type: object
                      required: [type]
                      properties:
                        type:
                          type: string
                          enum: [auto, any]
                    - type: object
                      required: [type, name]
                      properties:
                        type:
                          type: string
                          const: tool
                        name:
                          type: string
                metadata:
                  type: object
                  properties:
                    user_id:
                      type: string
      responses:
        "200":
          description: Message response (non-streaming) or named SSE events stream.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    const: message
                  role:
                    type: string
                    const: assistant
                  content:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            type:
                              type: string
                              const: text
                            text:
                              type: string
                        - type: object
                          properties:
                            type:
                              type: string
                              const: tool_use
                            id:
                              type: string
                            name:
                              type: string
                            input:
                              type: object
                  model:
                    type: string
                  stop_reason:
                    type: string
                    enum: [end_turn, max_tokens, stop_sequence, tool_use]
                  stop_sequence:
                    type: string
                    nullable: true
                  usage:
                    type: object
                    properties:
                      input_tokens:
                        type: integer
                      output_tokens:
                        type: integer
            text/event-stream:
              schema:
                type: string
                description: >
                  Named SSE events: message_start, content_block_start, ping,
                  content_block_delta, content_block_stop, message_delta, message_stop.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    const: error
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [invalid_request_error, authentication_error, permission_error, not_found_error, rate_limit_error, api_error, overloaded_error]
                      message:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/responses:
    post:
      operationId: openaiResponses
      summary: OpenAI Responses API-compatible endpoint
      description: >
        Drop-in replacement for the OpenAI Responses API.
        Model format: `provider/model` (e.g. `openai/gpt-5`).
        Compatible with Codex CLI (which dropped Chat Completions support in 0.125),
        Cursor, and the OpenAI Responses SDK.
        Supports streaming via canonical Responses event sequence and non-streaming JSON.
      tags: [OpenAI Responses Compatible]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model:
                  type: string
                  description: 'Format: provider/model (e.g. "openai/gpt-5").'
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        oneOf:
                          - type: object
                            required: [role, content]
                            properties:
                              type:
                                type: string
                                const: message
                              role:
                                type: string
                                enum: [user, assistant, system, developer]
                              content:
                                oneOf:
                                  - type: string
                                  - type: array
                                    items:
                                      oneOf:
                                        - type: object
                                          required: [type, text]
                                          properties:
                                            type:
                                              type: string
                                              const: input_text
                                            text:
                                              type: string
                                        - type: object
                                          required: [type]
                                          properties:
                                            type:
                                              type: string
                                              const: input_image
                                            image_url:
                                              type: string
                                              nullable: true
                                            file_id:
                                              type: string
                                              nullable: true
                                            detail:
                                              type: string
                                              enum: [low, high, auto, original]
                                        - type: object
                                          required: [type, text]
                                          properties:
                                            type:
                                              type: string
                                              const: output_text
                                            text:
                                              type: string
                          - type: object
                            required: [type, call_id, name, arguments]
                            properties:
                              type:
                                type: string
                                const: function_call
                              call_id:
                                type: string
                              name:
                                type: string
                              arguments:
                                type: string
                          - type: object
                            required: [type, call_id, output]
                            properties:
                              type:
                                type: string
                                const: function_call_output
                              call_id:
                                type: string
                              output:
                                oneOf:
                                  - type: string
                                  - type: array
                                    items:
                                      type: object
                instructions:
                  type: string
                  nullable: true
                stream:
                  type: boolean
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                  nullable: true
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                  nullable: true
                max_output_tokens:
                  type: integer
                  minimum: 1
                  nullable: true
                tools:
                  type: array
                  nullable: true
                  items:
                    type: object
                    required: [type, name]
                    properties:
                      type:
                        type: string
                        const: function
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      parameters:
                        type: object
                        nullable: true
                      strict:
                        type: boolean
                        nullable: true
                tool_choice:
                  oneOf:
                    - type: string
                      enum: [auto, required, none]
                    - type: object
                      required: [type, name]
                      properties:
                        type:
                          type: string
                          const: function
                        name:
                          type: string
                parallel_tool_calls:
                  type: boolean
                  nullable: true
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  nullable: true
      responses:
        "200":
          description: Response object (non-streaming) or canonical SSE events stream.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    const: response
                  created_at:
                    type: integer
                  status:
                    type: string
                    enum: [completed, failed, in_progress, incomplete]
                  model:
                    type: string
                  output:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            type:
                              type: string
                              const: message
                            id:
                              type: string
                            role:
                              type: string
                              const: assistant
                            status:
                              type: string
                            content:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                    const: output_text
                                  text:
                                    type: string
                                  annotations:
                                    type: array
                        - type: object
                          properties:
                            type:
                              type: string
                              const: function_call
                            id:
                              type: string
                            call_id:
                              type: string
                            name:
                              type: string
                            arguments:
                              type: string
                            status:
                              type: string
                  output_text:
                    type: string
                  usage:
                    type: object
                    nullable: true
                    properties:
                      input_tokens:
                        type: integer
                      output_tokens:
                        type: integer
                      total_tokens:
                        type: integer
            text/event-stream:
              schema:
                type: string
                description: >
                  Canonical Responses SSE events:
                  response.created, response.in_progress, response.output_item.added,
                  response.content_part.added, response.output_text.delta,
                  response.output_text.done, response.content_part.done,
                  response.output_item.done, response.function_call_arguments.delta,
                  response.function_call_arguments.done, response.completed,
                  response.failed, error.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                      message:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  #  Public (no auth)
  # ──────────────────────────────────────────────
  /api/public/models:
    get:
      operationId: getPublicModels
      summary: List all providers with models, pricing, and capabilities
      tags: [Public]
      security: []
      responses:
        "200":
          description: Provider and model catalogue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        models:
                          type: array
                          items:
                            $ref: "#/components/schemas/ModelInfo"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/public/voices:
    get:
      operationId: getPublicVoices
      summary: List all voices by provider
      tags: [Public]
      security: []
      responses:
        "200":
          description: Voice catalogue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        voices:
                          type: array
                          items:
                            $ref: "#/components/schemas/VoiceInfo"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/public/voices/preview:
    post:
      operationId: previewVoice
      summary: Generate a voice preview (mlxaudio only)
      tags: [Public]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, voiceId]
              properties:
                provider:
                  type: string
                  const: mlxaudio
                voiceId:
                  type: string
      responses:
        "200":
          description: Voice preview audio.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      audio:
                        type: string
                        description: Base64-encoded audio.
                      mimeType:
                        type: string
                      voiceId:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/public/openapi.yaml:
    get:
      operationId: getOpenApiSpec
      summary: Download this OpenAPI specification
      tags: [Public]
      security: []
      responses:
        "200":
          description: OpenAPI 3.1 YAML specification.
          content:
            application/x-yaml:
              schema:
                type: string

# ═══════════════════════════════════════════════
#  Components
# ═══════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as a Bearer token.

  schemas:
    Message:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ContentPart"
        toolCalls:
          type: array
          items:
            type: object
            required: [id, type, function]
            properties:
              id:
                type: string
              type:
                type: string
                const: function
              function:
                type: object
                required: [name, arguments]
                properties:
                  name:
                    type: string
                  arguments:
                    type: string
        toolCallId:
          type: string

    ContentPart:
      oneOf:
        - $ref: "#/components/schemas/TextContent"
        - $ref: "#/components/schemas/ImageContent"
        - $ref: "#/components/schemas/DocumentContent"
        - $ref: "#/components/schemas/VideoContent"

    TextContent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          const: text
        text:
          type: string
          maxLength: 100000

    ImageContent:
      type: object
      required: [type, data]
      properties:
        type:
          type: string
          const: image
        data:
          type: string
          description: Base64-encoded image data.
          maxLength: 10000000
        mimeType:
          type: string

    DocumentContent:
      type: object
      required: [type, data, mimeType]
      properties:
        type:
          type: string
          const: document
        data:
          type: string
          description: Base64-encoded PDF data.
          maxLength: 10000000
        mimeType:
          type: string
          const: application/pdf

    VideoContent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: video
        data:
          type: string
          description: Base64-encoded video data.
          maxLength: 20000000
        fileId:
          type: string
          format: uuid
          description: Reference to a previously uploaded video.
        mimeType:
          type: string

    ToolDefinition:
      type: object
      required: [type, function]
      properties:
        type:
          type: string
          const: function
        function:
          type: object
          required: [name]
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object

    ModelInfo:
      type: object
      required: [id, name, contextWindow, maxOutputTokens]
      properties:
        id:
          type: string
        name:
          type: string
        contextWindow:
          type: integer
        maxOutputTokens:
          type: integer
        inputCostPer1k:
          type: number
          description: Cost per 1K input tokens (USD).
        outputCostPer1k:
          type: number
          description: Cost per 1K output tokens (USD).
        costPerImage:
          type: number
        costPerSecond:
          type: number
        costPerCharacter:
          type: number
        costPerHour:
          type: number
        costPerAnalysis:
          type: number
        capabilities:
          type: array
          items:
            type: string
            enum:
              - chat
              - image-generation
              - video-generation
              - text-to-speech
              - speech-to-text
              - image-recognition
              - face-detection
              - conversation
              - sound-effect
              - music-generation
              - embeddings

    VoiceInfo:
      type: object
      required: [id, name, provider, category]
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        category:
          type: string
        gender:
          type: string
        accent:
          type: string
        age:
          type: string
        language:
          type: string
        description:
          type: string
        preview_url:
          type: string
          format: uri
        labels:
          type: object
          additionalProperties:
            type: string

    QueueResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [queueId, status, message]
          properties:
            queueId:
              type: string
            status:
              type: string
              const: queued
            message:
              type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        statusCode:
          type: integer
        message:
          type: string

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object

  responses:
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
