# everforest (dark) - Generated by FormalConf
# Mako notification daemon theme

font=JetBrains Mono 11
background-color=#2D353B
text-color=#D3C6AA
border-color=#475258
border-size=2
border-radius=8
padding=12
margin=12
default-timeout=5000
icons=1
icon-path=/usr/share/icons/Papirus-Dark
max-icon-size=48
markup=1
actions=1
format=<b>%s</b>\n%b
anchor=top-right
width=350
height=150

[urgency=low]
background-color=#475258
border-color=#475258

[urgency=normal]
background-color=#2D353B
border-color=#7FBBB3

[urgency=critical]
background-color=#E67E80
text-color=#2D353B
border-color=#E67E80
default-timeout=0
