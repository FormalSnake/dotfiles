# Amekoji (dark) - Generated by FormalConf
# Hyprland color configuration
# Source this file from your main hyprland.conf

# GTK/GNOME theme (Linux)
env = GTK_THEME,formalconf-amekoji-Dark
exec = gsettings set org.gnome.desktop.interface gtk-theme "formalconf-amekoji-Dark"
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface icon-theme "{{gtk.icon_theme}}"
exec = gsettings set org.gnome.desktop.interface cursor-theme "{{gtk.cursor_theme}}"
exec = gsettings set org.gnome.desktop.interface cursor-size {{gtk.cursor_size}}
exec = gsettings set org.gnome.desktop.interface font-name "{{gtk.font}}"

# General colors
general {
    col.active_border = rgba(133,171,188,1) rgba(133,171,188,1) 45deg
    col.inactive_border = rgb(120,133,135)
}

# Group colors
group {
    col.border_active = rgba(133,171,188,1)
    col.border_inactive = rgba(120,133,135,1)
    col.border_locked_active = rgba(147,179,166,1)
    col.border_locked_inactive = rgba(120,133,135,1)

    groupbar {
        col.active = rgba(133,171,188,1)
        col.inactive = rgba(35,40,41,1)
        col.locked_active = rgba(147,179,166,1)
        col.locked_inactive = rgba(120,133,135,1)
    }
}

# Decoration
decoration {
    shadow {
        color = rgba(35,40,41,1)
        color_inactive = rgba(35,40,41,1)
    }
}

# Misc
misc {
    background_color = rgba(35,40,41,1)
}
