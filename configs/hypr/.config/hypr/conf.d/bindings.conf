# Keybindings

# Variables
$terminal = ghostty
$fileManager = nautilus --new-window
$menu = walker
$scriptsDir = ~/.config/formalconf/scripts
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"
$mainMod = SUPER

# ── App Launchers ────────────────────────────────────────────────────

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, helium-browser
bind = $mainMod SHIFT, M, exec, $scriptsDir/launch-or-focus.sh spotify-launcher Spotify
bind = $mainMod SHIFT, D, exec, $scriptsDir/launch-tui.sh lazydocker lazydocker
bind = $mainMod SHIFT, G, exec, $scriptsDir/launch-tui.sh lazygit lazygit

# ── Window Management ────────────────────────────────────────────────

bind = $mainMod, Q, killactive,
bind = $mainMod, W, killactive,
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, movefocus, d
bind = $mainMod, F, fullscreen, 0
bind = $mainMod CTRL, F, fullscreen, 1
bind = $mainMod ALT, F, fullscreen, 2
bind = $mainMod, O, exec, $scriptsDir/window-pop.sh

# Move focus (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod ALT, J, togglesplit,

# Swap windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u

# Resize
bind = $mainMod, equal, resizeactive, 50 0
bind = $mainMod, minus, resizeactive, -50 0
bind = $mainMod SHIFT, equal, resizeactive, 0 -50
bind = $mainMod SHIFT, minus, resizeactive, 0 50

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Workspace navigation
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod CTRL, TAB, workspace, previous

# Move workspace to other monitor
bind = $mainMod SHIFT ALT, H, movecurrentworkspacetomonitor, l
bind = $mainMod SHIFT ALT, L, movecurrentworkspacetomonitor, r
bind = $mainMod SHIFT ALT, J, movecurrentworkspacetomonitor, d
bind = $mainMod SHIFT ALT, K, movecurrentworkspacetomonitor, u

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# Groups
bind = $mainMod, G, togglegroup,
bind = $mainMod ALT, G, moveoutofgroup,

# Alt-tab window cycling
bind = ALT, TAB, cyclenext,
bind = ALT SHIFT, TAB, cyclenext, prev

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Utilities ────────────────────────────────────────────────────────

bind = $mainMod, ESCAPE, exec, $scriptsDir/lock-screen.sh
bind = $mainMod CTRL, L, exec, $scriptsDir/lock-screen.sh
bind = $mainMod, M, exec, $scriptsDir/power-menu.sh
bind = $mainMod SHIFT, SPACE, exec, $scriptsDir/toggle-waybar.sh
bind = $mainMod CTRL, SPACE, exec, $scriptsDir/cycle-wallpaper.sh
bind = $mainMod, BACKSPACE, exec, hyprctl setprop active opaque toggle
bind = $mainMod SHIFT, BACKSPACE, exec, $scriptsDir/toggle-gaps.sh
bind = $mainMod SHIFT, R, exec, hyprctl dispatch dpms off && sleep 0.5 && hyprctl dispatch dpms on

# Notifications (mako)
bind = $mainMod, COMMA, exec, makoctl dismiss
bind = $mainMod SHIFT, COMMA, exec, makoctl dismiss --all
bind = $mainMod CTRL, COMMA, exec, makoctl mode -t do-not-disturb

# Nightlight / system controls
bind = $mainMod CTRL, N, exec, $scriptsDir/toggle-nightlight.sh
bind = $mainMod CTRL, A, exec, pavucontrol
bind = $mainMod CTRL, B, exec, $scriptsDir/launch-tui.sh bluetui bluetui
bind = $mainMod CTRL, W, exec, $scriptsDir/launch-tui.sh nmtui nmtui

# ── Captures ─────────────────────────────────────────────────────────

bind = , PRINT, exec, $scriptsDir/screenshot.sh region
bind = $mainMod, PRINT, exec, hyprpicker -a
bind = ALT, PRINT, exec, $scriptsDir/screenrecord.sh

# ── Clipboard ────────────────────────────────────────────────────────

bind = $mainMod, C, exec, wl-copy "$(wl-paste)"
bind = $mainMod, V, exec, wl-paste | wtype -
bind = $mainMod, X, exec, wl-copy "$(wl-paste)" && wtype -k BackSpace
bind = $mainMod CTRL, V, exec, walker -m clipboard

# ── Media (swayosd) ──────────────────────────────────────────────────

bindel = , XF86AudioRaiseVolume, exec, $osdclient --output-volume raise
bindel = , XF86AudioLowerVolume, exec, $osdclient --output-volume lower
bindel = , XF86AudioMute, exec, $osdclient --output-volume mute-toggle
bindel = , XF86AudioMicMute, exec, $osdclient --input-volume mute-toggle
bindel = , XF86MonBrightnessUp, exec, $osdclient --brightness raise
bindel = , XF86MonBrightnessDown, exec, $osdclient --brightness lower

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# Precise adjustments (1%)
bindel = ALT, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = ALT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ALT, XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
bindel = ALT, XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-

# Keyboard backlight
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d '*::kbd_backlight' set 5%+
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d '*::kbd_backlight' set 5%-

# ── Lid Switch ──────────────────────────────────────────────────────

bindl = , switch:on:Lid Switch, exec, systemctl suspend
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on
