# Window rules and workspace assignments

# ── Named Workspaces ─────────────────────────────────────────────────

workspace = 1, name:web, monitor:DP-1, default:true
workspace = 2, name:terminal, monitor:DP-1
workspace = 3, name:code, monitor:DP-1
workspace = 4, name:communication, monitor:eDP-1, default:true
workspace = 5, name:productivity, monitor:DP-1
workspace = 6, name:design, monitor:DP-1
workspace = 7, name:ai, monitor:DP-1
workspace = 8, name:media, monitor:eDP-1
workspace = 9, name:gaming, monitor:eDP-1

# ── Global Rules ─────────────────────────────────────────────────────

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Layer Rules ──────────────────────────────────────────────────────

layerrule = noanim, walker

# ── Floating Windows ─────────────────────────────────────────────────

windowrule {
    name = bluetui-float
    match:title = ^bluetui$
    float = yes
    size = 800 600
    center = true
}

windowrule {
    name = tui-float
    match:title = ^tui-float$
    float = yes
    size = 900 650
    center = true
}

windowrule {
    name = pavucontrol-float
    match:class = ^(pavucontrol)$
    float = yes
    size = 800 500
    center = true
}

# Eww Spotify popup
windowrulev2 = float, class:^(eww)$, title:^(spotify-popup)$
windowrulev2 = pin, class:^(eww)$, title:^(spotify-popup)$
windowrulev2 = nofocus, class:^(eww)$, title:^(spotify-popup)$

# ── Auto-Route to Workspaces ────────────────────────────────────────

# Web browsers -> web (1)
windowrulev2 = workspace 1, class:^(Brave-browser|firefox|zen-browser|lynx|helium)$

# Terminals -> terminal (2)
windowrulev2 = workspace 2, class:^(com.mitchellh.ghostty|Warp)$

# Code editors -> code (3)
windowrulev2 = workspace 3, class:^(dev.zed.Zed|Code)$

# Communication -> communication (4)
windowrulev2 = workspace 4, class:^(Slack|whatsapp-desktop|discord|vesktop|org.telegram.desktop|Beeper)$

# Productivity -> productivity (5)
windowrulev2 = workspace 5, class:^(notion-app|obsidian|thunderbird)$

# Design -> design (6)
windowrulev2 = workspace 6, class:^(figma-linux|org.gimp.GIMP)$

# AI -> ai (7)
windowrulev2 = workspace 7, class:^(claude|perplexity)$

# Media -> media (8)
windowrulev2 = workspace 8, class:^(Spotify|Cider|mpv)$

# Gaming -> gaming (9)
windowrulev2 = workspace 9, class:^(steam|lutris)$
