# Window rules and workspace assignments

# ── Named Workspaces ─────────────────────────────────────────────────

workspace = 1, name:web, default:true
workspace = 2, name:terminal
workspace = 3, name:code
workspace = 4, name:communication
workspace = 5, name:productivity
workspace = 6, name:design
workspace = 7, name:ai
workspace = 8, name:media
workspace = 9, name:gaming

# ── Global Rules ─────────────────────────────────────────────────────

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Layer Rules ──────────────────────────────────────────────────────

layerrule = no_anim on, match:namespace walker

# ── Floating Windows ─────────────────────────────────────────────────

windowrule {
    name = bluetui-float
    match:title = ^bluetui$
    float = yes
    size = 800 600
    center = true
}

windowrule {
    name = tui-float
    match:title = ^tui-float$
    float = yes
    size = 900 650
    center = true
}

windowrule {
    name = pavucontrol-float
    match:class = ^(pavucontrol)$
    float = yes
    size = 800 500
    center = true
}

# Eww Spotify popup
windowrule {
    name = eww-spotify-popup
    match:class = ^(eww)$
    match:title = ^(spotify-popup)$
    float = on
    pin = on
    no_focus = on
}

# ── Auto-Route to Workspaces ────────────────────────────────────────

# Web browsers -> web (1)
windowrule {
    name = route-web
    match:class = ^(Brave-browser|firefox|zen-browser|lynx|helium)$
    workspace = 1
}

# Terminals -> terminal (2)
windowrule {
    name = route-terminal
    match:class = ^(com.mitchellh.ghostty|Warp)$
    workspace = 2
}

# Code editors -> code (3)
windowrule {
    name = route-code
    match:class = ^(dev.zed.Zed|Code)$
    workspace = 3
}

# Communication -> communication (4)
windowrule {
    name = route-communication
    match:class = ^(Slack|whatsapp-desktop|discord|vesktop|org.telegram.desktop|Beeper)$
    workspace = 4
}

# Productivity -> productivity (5)
windowrule {
    name = route-productivity
    match:class = ^(notion-app|obsidian|thunderbird)$
    workspace = 5
}

# Design -> design (6)
windowrule {
    name = route-design
    match:class = ^(figma-linux|org.gimp.GIMP)$
    workspace = 6
}

# AI -> ai (7)
windowrule {
    name = route-ai
    match:class = ^(claude|perplexity)$
    workspace = 7
}

# Media -> media (8)
windowrule {
    name = route-media
    match:class = ^(Spotify|Cider|mpv)$
    workspace = 8
}

# Gaming -> gaming (9)
windowrule {
    name = route-gaming
    match:class = ^(steam|lutris)$
    workspace = 9
}
